<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #05050a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        .title { color: #00f2ff; font-weight: 300; letter-spacing: 3px; margin-bottom: 20px; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 12px; padding: 20px 10px;
            font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        .btn:active { background: #00f2ff; color: black; transform: scale(0.95); }
        .footer { margin-top: 20px; font-size: 10px; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="title">PRO TERMINAL</div>
    <div class="grid">
        <div class="btn" onclick="send('EURUSD')">🇪🇺 EUR/USD</div>
        <div class="btn" onclick="send('GBPUSD')">🇬🇧 GBP/USD</div>
        <div class="btn" onclick="send('USDJPY')">🇯🇵 USD/JPY</div>
        <div class="btn" onclick="send('AUDCAD')">🇨🇦 AUD/CAD</div>
        <div class="btn" onclick="send('XAUUSD')">🥇 GOLD (XAU)</div>
        <div class="btn" onclick="send('BTCUSD')">₿ BITCOIN</div>
    </div>
    <div class="footer">Анализ уровней поддержки и сопротивления (5m)</div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function send(pair) {
            tg.sendData(pair);
            tg.close();
        }
    </script>
</body>
</html>
